description: Solomon Systech SSD1316 display controller

compatible: "solomon,ssd1316fb"
include: [display-controller.yaml, base.yaml]

on-bus: i2c

properties:
    height:
      type: int
      required: true
    width:
      type: int
      required: true
    reg:
      required: true
    multiplex-ratio:
      type: int
      required: true
    display-offset:
      type: int
      default: 0
    segment-remap:
      type: boolean
    com-invdir:
      type: boolean
    com-sequential:
      type: boolean
    prechargep:
      type: int
      default: 0x22
    reset-gpios:
      type: phandle-array
    supply-gpios:
      type: phandle-array
    data-cmd-gpios:
      type: phandle-array
    ready-time-ms:
      type: int
      default: 100
    inversion-on:
      type: boolean
    segment-offset:
      type: int
      default: 0
    page-offset:
      type: int
      default: 0